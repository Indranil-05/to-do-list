<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskflow — Premium To-Do App</title>

  <!-- Google Fonts: Clash Display + DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>

  <!-- SortableJS for drag and drop -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== TOAST CONTAINER ========== -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ========== DELETE CONFIRMATION MODAL ========== -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-icon"><i class="ph ph-trash"></i></div>
      <h3 class="modal-title">Delete Task?</h3>
      <p class="modal-desc">This action cannot be undone.</p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
        <button id="modal-confirm" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- ========== MAIN WRAPPER ========== -->
  <div class="app-wrapper">

    <!-- ===== HEADER ===== -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon"><i class="ph-fill ph-lightning"></i></span>
          <span class="logo-text">Taskflow</span>
        </div>
        <p class="header-date" id="header-date"></p>
      </div>
      <div class="header-right">
        <button id="theme-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
          <i class="ph ph-sun" id="theme-icon"></i>
        </button>
      </div>
    </header>

    <!-- ===== DASHBOARD STATS ===== -->
    <section class="stats-grid" aria-label="Task statistics">
      <div class="stat-card stat-total">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="stat-total">0</div>
        <i class="ph-fill ph-list-checks stat-bg-icon"></i>
      </div>
      <div class="stat-card stat-pending">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="stat-pending">0</div>
        <i class="ph-fill ph-hourglass stat-bg-icon"></i>
      </div>
      <div class="stat-card stat-completed">
        <div class="stat-label">Done</div>
        <div class="stat-value" id="stat-completed">0</div>
        <i class="ph-fill ph-check-circle stat-bg-icon"></i>
      </div>
      <div class="stat-card stat-high">
        <div class="stat-label">High Priority</div>
        <div class="stat-value" id="stat-high">0</div>
        <i class="ph-fill ph-fire stat-bg-icon"></i>
      </div>
    </section>

    <!-- ===== PROGRESS BAR ===== -->
    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-label">Overall Progress</span>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
      <div class="progress-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <!-- ===== ADD TASK FORM ===== -->
    <section class="add-task-section">
      <div class="add-task-card">
        <div class="form-row">
          <input
            type="text"
            id="task-input"
            class="task-input"
            placeholder="What needs to be done? (Press Enter to add)"
            maxlength="200"
            autocomplete="off"
            aria-label="New task"
          />
          <button id="add-btn" class="btn btn-primary" aria-label="Add task">
            <i class="ph ph-plus-bold"></i>
            <span>Add Task</span>
          </button>
        </div>
        <div class="form-row form-meta">
          <!-- Category -->
          <div class="meta-group">
            <label for="task-category"><i class="ph ph-tag"></i> Category</label>
            <input type="text" id="task-category" placeholder="e.g. Work, Study…" list="category-suggestions" />
            <datalist id="category-suggestions">
              <option value="Work"></option>
              <option value="Study"></option>
              <option value="Personal"></option>
              <option value="Health"></option>
              <option value="Finance"></option>
            </datalist>
          </div>
          <!-- Priority -->
          <div class="meta-group">
            <label for="task-priority"><i class="ph ph-flag"></i> Priority</label>
            <select id="task-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <!-- Due Date -->
          <div class="meta-group">
            <label for="task-due"><i class="ph ph-calendar"></i> Due Date</label>
            <input type="datetime-local" id="task-due" />
          </div>
        </div>
      </div>
    </section>

    <!-- ===== SEARCH + FILTER + SORT TOOLBAR ===== -->
    <div class="toolbar">
      <div class="search-wrap">
        <i class="ph ph-magnifying-glass search-icon"></i>
        <input type="search" id="search-input" class="search-input" placeholder="Search tasks…" aria-label="Search tasks" />
      </div>
      <div class="filter-sort-row">
        <!-- Filter Tabs -->
        <div class="filter-tabs" role="tablist" aria-label="Filter tasks">
          <button class="filter-tab active" data-filter="all" role="tab">All</button>
          <button class="filter-tab" data-filter="pending" role="tab">Pending</button>
          <button class="filter-tab" data-filter="completed" role="tab">Completed</button>
          <button class="filter-tab" data-filter="high" role="tab">🔥 High</button>
        </div>
        <!-- Sort -->
        <div class="sort-wrap">
          <i class="ph ph-sort-ascending"></i>
          <select id="sort-select" aria-label="Sort tasks">
            <option value="created">Created</option>
            <option value="due">Due Date</option>
            <option value="priority">Priority</option>
          </select>
        </div>
      </div>
    </div>

    <!-- ===== TASK LIST ===== -->
    <main>
      <ul id="task-list" class="task-list" aria-label="Task list"></ul>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-illustration">
          <i class="ph-thin ph-clipboard-text"></i>
        </div>
        <h3>Nothing here yet</h3>
        <p>Add a task above to get started. You've got this! 💪</p>
      </div>
    </main>

    <!-- ===== BOTTOM ACTION BAR ===== -->
    <footer class="bottom-bar">
      <span class="bottom-info" id="bottom-info">0 tasks</span>
      <button id="clear-completed-btn" class="btn btn-ghost btn-sm" title="Clear all completed tasks">
        <i class="ph ph-broom"></i> Clear Completed
      </button>
    </footer>

    <!-- ===== KEYBOARD SHORTCUTS HINT ===== -->
    <div class="shortcuts-hint">
      <span><kbd>Enter</kbd> Add task</span>
      <span><kbd>Esc</kbd> Cancel edit</span>
    </div>

  </div><!-- /app-wrapper -->

  <script src="script.js"></script>
</body>
</html>
